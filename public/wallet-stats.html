<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Wallet-Stats · Kfz-Experten Hannover</title>
  <link rel="icon" href="/logo/favicon-180.png" />
  <link rel="apple-touch-icon" href="/logo/favicon-180.png" />
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #8a8a8a;
      --gold: #d6b204;
      --card: #0b0b0d;
      --line: #1f1f23;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
    .wrap { max-width: 560px; margin: 0 auto; padding: env(safe-area-inset-top, 20px) 20px 40px;
      padding-top: max(env(safe-area-inset-top), 24px); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .brand img { width: 36px; height: 36px; }
    .brand-text { font-size: 13px; color: var(--muted); letter-spacing: 0.04em; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px 18px 20px; }
    .card.full { grid-column: 1 / -1; }
    .card.hero { background: linear-gradient(180deg, #14140f 0%, #0b0b0d 100%); border-color: #2a2208; }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
    .num { font-size: 44px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .num.gold { color: var(--gold); }
    .num.small { font-size: 28px; }
    .delta { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .footer { display: flex; justify-content: space-between; align-items: center;
      margin-top: 22px; font-size: 12px; color: var(--muted); }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; vertical-align: middle; margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.7); animation: pulse 2s infinite; }
    .dot.err { background: #ef4444; animation: none; box-shadow: none; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); } 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
    .err { color: #ef4444; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="/logo/wallet-logo.png" alt="" />
      <div class="brand-text">Kfz-Experten Hannover · Wallet-Stats</div>
    </div>
    <h1>Google-Wallet-Pass · Live</h1>
    <div class="subtitle">Auto-Refresh alle 10 Sekunden</div>

    <div class="grid">
      <div class="card hero full">
        <div class="label">Aktuell gespeichert</div>
        <div class="num gold" id="active">–</div>
        <div class="delta" id="delta"></div>
      </div>
      <div class="card">
        <div class="label">Gesamt-Saves</div>
        <div class="num small" id="saves">–</div>
      </div>
      <div class="card">
        <div class="label">Gelöscht</div>
        <div class="num small" id="deletes">–</div>
      </div>
    </div>

    <div class="footer">
      <div><span class="dot" id="dot"></span><span id="status">Verbinde …</span></div>
      <div id="last">–</div>
    </div>
    <div class="err" id="err"></div>
  </div>

  <script>
    const API = 'https://europe-west1-kfz-gutachter-wallet.cloudfunctions.net/walletStats'
    const REFRESH_MS = 10_000
    const $ = (id) => document.getElementById(id)

    async function load() {
      try {
        const r = await fetch(API, { cache: 'no-store' })
        if (!r.ok) throw new Error('HTTP ' + r.status)
        const d = await r.json()
        $('active').textContent = d.currentlySaved
        $('saves').textContent = d.saves
        $('deletes').textContent = d.deletes
        const delta = d.saves - d.deletes
        $('delta').textContent = d.saves === 0
          ? 'Noch keine Saves'
          : `${d.deletes} von ${d.saves} (${Math.round(d.deletes / d.saves * 100)} %) wieder gelöscht`
        $('status').textContent = 'Live'
        $('dot').classList.remove('err')
        $('last').textContent = new Date().toLocaleTimeString('de-DE')
        $('err').textContent = ''
      } catch (e) {
        $('status').textContent = 'Verbindungsfehler'
        $('dot').classList.add('err')
        $('err').textContent = e.message
      }
    }

    load()
    setInterval(load, REFRESH_MS)
    document.addEventListener('visibilitychange', () => { if (!document.hidden) load() })
  </script>
</body>
</html>
